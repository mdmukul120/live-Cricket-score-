name: Cricbuzz Auto Scraper

on:
  schedule:
    # প্রতি ৫ মিনিট পর পর অটোমেটিক চলবে
    - cron: '*/5 * * * *'
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য অপশন

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest

    # Write permission দেওয়া হলো যাতে score.json পুশ করা যায়
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper Script
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add score.json
          git commit -m "Auto-update live cricket scores" || exit 0
          git push
